name: Open Design Dev Box

on:
  workflow_dispatch:

jobs:
  devbox:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Show Tailscale Info
        run: |
          echo "========================================"
          echo "TAILSCALE IP:"
          tailscale ip -4
          echo "========================================"

      - name: Start Ubuntu Dev Container
        run: |
          docker run -d \
            --name devbox \
            -p 7456:7456 \
            ubuntu:24.04 \
            sleep infinity

      - name: Install Base Packages
        run: |
          docker exec devbox bash -c "
            apt update &&
            DEBIAN_FRONTEND=noninteractive apt install -y \
              curl \
              git \
              nano \
              htop \
              build-essential \
              ca-certificates
          "

      - name: Install Node 24
        run: |
          docker exec devbox bash -c "
            curl -fsSL https://deb.nodesource.com/setup_24.x | bash - &&
            apt install -y nodejs &&
            npm install -g corepack &&
            corepack enable &&
            corepack prepare pnpm@10.33.2 --activate
          "

      - name: Install OpenCode
        run: |
          docker exec devbox bash -c "
            npm install -g opencode || true
          "

      - name: Clone Open Design
        run: |
          docker exec devbox bash -c "
            cd /root &&
            git clone https://github.com/nexu-io/open-design.git &&
            cd open-design &&
            pnpm install
          "

      - name: Start Open Design
        run: |
          docker exec -d devbox bash -c "
            cd /root/open-design &&
            pnpm tools-dev run web
          "

      - name: Wait For Startup
        run: sleep 60

      - name: Detect Open Design Port
        run: |
          docker exec devbox bash -c "
            ss -tulpn
          "

      - name: Expose Port Through Tailscale
        run: |
          sudo tailscale serve reset
          sudo tailscale serve tcp:7456 tcp://127.0.0.1:7456

      - name: Keep Runner Alive
        run: sleep 21600
